<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dawi Bingo Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #101820; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { display: flex; justify-content: space-around; background: #1a222d; padding: 10px; font-size: 14px; }
        .header b { color: #fee715; }
        .ball-area { margin: 20px auto; width: 100px; height: 100px; border: 5px solid #4ee44e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; }
        .grid { width: 95%; max-width: 380px; margin: 10px auto; border-spacing: 4px; }
        .grid th { background: #e94560; padding: 10px; border-radius: 4px; }
        .grid td { background: white; color: black; height: 55px; width: 20%; font-size: 22px; font-weight: bold; border-radius: 4px; }
        .marked { background: #4ee44e !important; color: white !important; }
        #status { color: #fee715; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div>Players <b>400</b></div>
        <div>Bet <b>10</b></div>
        <div>Derash <b>3200</b></div>
    </div>

    <div class="ball-area" id="ball">-</div>
    <div id="status">ካርቴላ በመፍጠር ላይ...</div>

    <table class="grid">
        <thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
        <tbody id="card"></tbody>
    </table>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let numbers = [];
        let called = [];

        function start() {
            const tbody = document.getElementById('card');
            tbody.innerHTML = "";
            let ranges = [,,,,];
            
            for (let r = 0; r < 5; r++) {
                let tr = document.createElement('tr');
                numbers[r] = [];
                for (let c = 0; c < 5; c++) {
                    let td = document.createElement('td');
                    if (r === 2 && c === 2) {
                        td.innerText = "FREE";
                        td.className = "marked";
                        numbers[r][c] = { v: "FREE", m: true };
                    } else {
                        let val;
                        do {
                            val = Math.floor(Math.random() * (ranges[c] - ranges[c] + 1)) + ranges[c];
                        } while (numbers.some(row => row[c] && row[c].v === val));
                        td.innerText = val;
                        td.id = `cell-${r}-${c}`;
                        numbers[r][c] = { v: val, m: false };
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
            
            let count = 5;
            let timer = setInterval(() => {
                document.getElementById('status').innerText = "ጨዋታው በ " + count + " ሰከንድ ይጀምራል...";
                if (count-- <= 0) {
                    clearInterval(timer);
                    document.getElementById('status').innerText = "ጨዋታው ተጀምሯል!";
                    setInterval(draw, 4000);
                }
            }, 1000);
        }

        function draw() {
            let ball;
            do { ball = Math.floor(Math.random() * 75) + 1; } while (called.includes(ball));
            called.push(ball);
            let L = ball <= 15 ? "B" : ball <= 30 ? "I" : ball <= 45 ? "N" : ball <= 60 ? "G" : "O";
            document.getElementById('ball').innerText = L + "-" + ball;

            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    if (numbers[r][c].v === ball) {
                        document.getElementById(`cell-${r}-${c}`).className = "marked";
                    }
                }
            }
        }

        // ገጹ እንደተከፈተ እንዲሰራ የሚያስገድድ
        window.onload = start;
    </script>
</body>
</html>
