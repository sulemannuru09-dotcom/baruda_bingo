<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baruda Bingo - Clean</title>
    <style>
        body { background: #161e30; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .title { color: #4ee44e; font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        
        /* ቁጥር መምረጫ */
        #selector-page { display: block; }
        .grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 
            max-width: 400px; margin: 0 auto; background: #0c121c; 
            padding: 15px; border-radius: 12px; border: 2px solid #4ee44e;
            max-height: 500px; overflow-y: auto;
        }
        .num-btn { background: #e94560; color: white; border: none; padding: 12px 0; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* ካርቴላ */
        #card-page { display: none; }
        .bingo-table { width: 100%; max-width: 360px; margin: 20px auto; border-collapse: separate; border-spacing: 5px; }
        .bingo-table th { background: #e94560; color: white; padding: 10px; border-radius: 5px; }
        .bingo-table td { background: white; color: black; height: 55px; font-size: 24px; font-weight: bold; border-radius: 5px; width: 20%; }
        
        .free { background: #4ee44e !important; color: white !important; font-size: 14px !important; }
        .back-btn { background: #ff4d4d; border: none; padding: 15px 40px; border-radius: 10px; color: white; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="selector-page">
        <div class="title">Baruda Bingo</div>
        <p>ካርቴላ ቁጥር ይምረጡ (1-200)</p>
        <div class="grid" id="grid"></div>
    </div>

    <div id="card-page">
        <div style="color: #4ee44e; font-size: 22px; margin-bottom: 15px;">ካርቴላ № <span id="card-id"></span></div>
        <table class="bingo-table">
            <thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
            <tbody id="card-body"></tbody>
        </table>
        <button class="back-btn" onclick="location.reload()">ተመለስ</button>
    </div>

    <script>
        // 1-200 ቁልፎችን መፍጠር
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 200; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.innerText = i;
            btn.onclick = () => {
                document.getElementById('selector-page').style.display = 'none';
                document.getElementById('card-page').style.display = 'block';
                document.getElementById('card-id').innerText = i;
                generateBingoLayout();
            };
            grid.appendChild(btn);
        }

        function generateBingoLayout() {
            const tbody = document.getElementById('card-body');
            tbody.innerHTML = "";
            
            let card = [[],[],[],[],[]];
            let ranges = [,,,,];
            
            for(let c=0; c<5; c++) {
                while(card[c].length < 5) {
                    let r = Math.floor(Math.random() * (ranges[c] - ranges[c] + 1)) + ranges[c];
                    if(!card[c].includes(r)) card[c].push(r);
                }
            }

            for(let r=0; r<5; r++) {
                let tr = document.createElement('tr');
                for(let c=0; c<5; c++) {
                    let td = document.createElement('td');
                    if(r===2 && c===2) {
                        td.innerText = "FREE";
                        td.className = "free";
                    } else {
                        td.innerText = card[c][r];
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }
    </script>
</body>
</html>
