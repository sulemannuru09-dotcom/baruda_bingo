<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo</title>
    <style>
        body { background: #161e30; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; max-height: 400px; overflow-y: auto; border: 2px solid #4ee44e; margin: 10px; }
        button { background: #e94560; color: white; border: none; padding: 10px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 20px; }
        td, th { border: 1px solid #ccc; height: 50px; font-size: 20px; width: 20%; }
        th { background: #e94560; color: white; }
    </style>
</head>
<body>
    <div id="p1">
        <h3>ካርቴላ ይምረጡ (1-200)</h3>
        <div class="grid" id="g"></div>
    </div>
    <div id="p2" style="display:none">
        <h3 id="cid"></h3>
        <table>
            <thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
            <tbody id="tb"></tbody>
        </table>
        <br>
        <button onclick="location.reload()" style="background:red; padding: 15px 40px;">ተመለስ</button>
    </div>
    <script>
        const g = document.getElementById('g');
        for(let i=1; i<=200; i++) {
            let b = document.createElement('button');
            b.innerText = i;
            b.onclick = () => {
                document.getElementById('p1').style.display='none';
                document.getElementById('p2').style.display='block';
                document.getElementById('cid').innerText = 'ካርቴላ № ' + i;
                make();
            };
            g.appendChild(b);
        }
        function make() {
            const tb = document.getElementById('tb');
            tb.innerHTML = "";
            let rgs = [,,,,];
            let cld = [];
            for(let i=0; i<5; i++) {
                let col = [];
                while(col.length<5) {
                    let r = Math.floor(Math.random()*(rgs[i]-rgs[i]+1))+rgs[i];
                    if(!col.includes(r)) col.push(r);
                }
                cld.push(col);
            }
            for(let r=0; r<5; r++) {
                let tr = document.createElement('tr');
                for(let c=0; c<5; c++) {
                    let td = document.createElement('td');
                    td.innerText = (r==2 && c==2) ? "FREE" : cld[c][r];
                    if(r==2 && c==2) td.style.background="#4ee44e";
                    tr.appendChild(td);
                }
                tb.appendChild(tr);
            }
        }
    </script>
</body>
</html>
