<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baruda Bingo Bot</title>
    <style>
        body { background-color: #ffffff; color: #333; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .header { background: #f8f9fa; padding: 15px; border-bottom: 2px solid #28a745; margin-bottom: 15px; }
        
        /* ቁጥር መምረጫ */
        #page1 { display: block; }
        .grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 
            max-width: 450px; margin: 0 auto; padding: 10px;
            max-height: 65vh; overflow-y: auto; border: 1px solid #ddd; border-radius: 10px;
        }
        .n-btn { background-color: #28a745; color: white; border: none; padding: 15px 0; border-radius: 5px; font-weight: bold; font-size: 16px; -webkit-tap-highlight-color: transparent; }

        /* ካርቴላ ገጽ */
        #page2 { display: none; }
        table { width: 100%; max-width: 380px; margin: 15px auto; border-collapse: separate; border-spacing: 3px; }
        th { background: #dc3545; color: white; padding: 10px; font-size: 20px; border-radius: 4px; }
        td { background: #f1f3f5; color: #212529; height: 55px; font-size: 24px; font-weight: bold; border: 1px solid #dee2e6; border-radius: 4px; width: 20%; }
        
        .free { background-color: #28a745 !important; color: white !important; font-size: 14px !important; }
        .back-btn { background-color: #6c757d; color: white; border: none; padding: 12px 40px; border-radius: 8px; margin-top: 20px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="page1">
        <div class="header">
            <h2 style="color: #28a745; margin: 0;">Baruda Bingo</h2>
            <p>ካርቴላ ቁጥር ይምረጡ (1-200)</p>
        </div>
        <div class="grid" id="main-grid"></div>
    </div>

    <div id="page2">
        <h2 id="card-label" style="color: #dc3545;"></h2>
        <table>
            <thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
            <tbody id="card-table-body"></tbody>
        </table>
        <button class="back-btn" onclick="goBack()">ተመለስ</button>
    </div>

    <script>
        // ቁልፎቹን መፍጠር
        const container = document.getElementById('main-grid');
        let htmlContent = "";
        for (let i = 1; i <= 200; i++) {
            // እያንዳንዱ ቁልፍ ሲነካ ቀጥታ openCard function እንዲጠራ ተደርጓል
            htmlContent += `<button class="n-btn" onclick="openCard(${i})">${i}</button>`;
        }
        container.innerHTML = htmlContent;

        function openCard(n) {
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'block';
            document.getElementById('card-label').innerText = "ካርቴላ № " + n;
            
            const tbody = document.getElementById('card-table-body');
            tbody.innerHTML = "";
            
            let card = [[],[],[],[],[]];
            let ranges = [,,,,];
            
            // የቢንጎ ቁጥሮችን ማመንጨት
            for(let i=0; i<5; i++) {
                while(card[i].length < 5) {
                    let r = Math.floor(Math.random() * (ranges[i] - ranges[i] + 1)) + ranges[i];
                    if(!card[i].includes(r)) card[i].push(r);
                }
            }

            // ሰንጠረዡን መገንባት
            for(let row=0; row<5; row++) {
                let tr = document.createElement('tr');
                for(let col=0; col<5; col++) {
                    let td = document.createElement('td');
                    if(row === 2 && col === 2) {
                        td.innerText = "FREE";
                        td.className = "free";
                    } else {
                        td.innerText = card[col][row];
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        function goBack() {
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page1').style.display = 'block';
        }
    </script>
</body>
</html>
