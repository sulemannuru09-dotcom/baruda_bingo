<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baruda Bingo</title>
    <style>
        body { background: #161e30; color: white; font-family: sans-serif; text-align: center; }
        .box { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 10px; border: 2px solid #4ee44e; max-height: 450px; overflow-y: auto; margin: 10px; }
        button { background: #e94560; color: white; border: none; padding: 15px 0; border-radius: 5px; font-weight: bold; }
        table { width: 100%; max-width: 350px; margin: 20px auto; background: white; color: black; border-collapse: collapse; }
        td, th { border: 2px solid #333; height: 50px; font-size: 22px; text-align: center; }
        th { background: #e94560; color: white; }
    </style>
</head>
<body>

    <div id="p1">
        <h3>ካርቴላ ይምረጡ (1-200)</h3>
        <div class="box" id="grid"></div>
    </div>

    <div id="p2" style="display:none">
        <h3 id="num" style="color: #4ee44e;"></h3>
        <table>
            <thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
            <tbody id="body"></tbody>
        </table>
        <br>
        <button onclick="location.reload()" style="background:red; padding: 15px 40px; font-size: 18px;">ተመለስ</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 200; i++) {
            let b = document.createElement('button');
            b.innerText = i;
            b.onclick = function() {
                document.getElementById('p1').style.display = 'none';
                document.getElementById('p2').style.display = 'block';
                document.getElementById('num').innerText = "ካርቴላ № " + i;
                
                let tb = document.getElementById('body');
                tb.innerHTML = "";
                let ranges = [,,,,];
                let card = [[],[],[],[],[]];

                for(let c=0; c<5; c++) {
                    while(card[c].length < 5) {
                        let r = Math.floor(Math.random() * (ranges[c] - ranges[c] + 1)) + ranges[c];
                        if(!card[c].includes(r)) card[c].push(r);
                    }
                }

                for(let r=0; r<5; r++) {
                    let tr = document.createElement('tr');
                    for(let c=0; c<5; c++) {
                        let td = document.createElement('td');
                        td.innerText = (r==2 && c==2) ? "FREE" : card[c][r];
                        if(r==2 && c==2) td.style.background = "#4ee44e";
                        tr.appendChild(td);
                    }
                    tb.appendChild(tr);
                }
            };
            grid.appendChild(b);
        }
    </script>
</body>
</html>
