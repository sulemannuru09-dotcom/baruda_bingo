<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; }
        .num-btn { background: #28a745; color: white; border: none; padding: 15px 0; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #card-view { display: none; background: white; color: black; margin: 15px; padding: 15px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; }
        td, th { border: 2px solid #333; height: 55px; font-size: 22px; font-weight: bold; text-align: center; }
        th { background: #dc3545; color: white; }
        .free { background: #28a745; color: white; font-size: 14px; }
        .back-btn { margin-top: 20px; padding: 15px 40px; background: #333; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="main-ui">
        <h2>Baruda Bingo 100</h2>
        <p>ቁጥር ሲነኩ ካርቴላው ከታች ይመጣል</p>
        <div class="grid" id="btn-container"></div>
    </div>

    <div id="card-view">
        <h2 id="card-id" style="color: #dc3545;"></h2>
        <table>
            <thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
            <tbody id="bingo-table"></tbody>
        </table>
        <button class="back-btn" onclick="location.reload()">ተመለስ</button>
    </div>

    <script>
        const container = document.getElementById('btn-container');
        // 1-100 ቁጥሮችን መፍጠር
        for (let i = 1; i <= 100; i++) {
            let b = document.createElement('button');
            b.className = 'num-btn';
            b.innerText = i;
            b.onclick = function() {
                console.log("Button clicked: " + i);
                showBingo(i);
            };
            container.appendChild(b);
        }

        function showBingo(n) {
            document.getElementById('main-ui').style.display = 'none';
            const view = document.getElementById('card-view');
            view.style.display = 'block';
            document.getElementById('card-id').innerText = "ካርቴላ № " + n;
            
            const tableBody = document.getElementById('bingo-table');
            tableBody.innerHTML = "";
            
            let cols = [[],[],[],[],[]];
            let ranges = [,,,,];
            
            for(let i=0; i<5; i++){
                while(cols[i].length < 5){
                    let r = Math.floor(Math.random()*(ranges[i]-ranges[i]+1))+ranges[i];
                    if(!cols[i].includes(r)) cols[i].push(r);
                }
            }

            for(let r=0; r<5; r++){
                let tr = document.createElement('tr');
                for(let c=0; c<5; c++){
                    let td = document.createElement('td');
                    if(r===2 && c===2) {
                        td.innerText = "FREE";
                        td.className = "free";
                    } else {
                        td.innerText = cols[c][r];
                    }
                    tr.appendChild(td);
                }
                tableBody.appendChild(tr);
            }
        }
    </script>
</body>
</html>
