<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baruda Bingo Official</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1c2541; color: white; text-align: center; margin: 0; padding: 0; }
        .header-info { display: flex; justify-content: space-around; background: #0b132b; padding: 10px 0; font-size: 12px; border-bottom: 1px solid #3a506b; }
        .header-info b { font-size: 16px; color: #ffffff; }
        .circle { margin: 15px auto; width: 100px; height: 100px; border: 5px solid #4ee44e; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .called-num { font-size: 30px; font-weight: bold; color: #4ee44e; }
        .bingo-table { width: 95%; max-width: 380px; margin: 5px auto; border-collapse: separate; border-spacing: 3px; }
        .bingo-table td { background: #ffffff; color: #000000; height: 50px; border-radius: 4px; font-size: 20px; font-weight: bold; width: 20%; }
        .marked { background: #4ee44e !important; color: white !important; }
        .hidden { display: none !important; }
        .sel-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
        .btn-select { background: #e94560; color: white; padding: 15px 0; border: none; border-radius: 6px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div id="scr1">
        <h2 style="margin-top:20px;">Baruda Bingo</h2>
        <p>ካርቴላ ይምረጡ</p>
        <div class="sel-grid" id="grid">
            <button class="btn-select" onclick="startGame(1)">1</button>
            <button class="btn-select" onclick="startGame(2)">2</button>
            <button class="btn-select" onclick="startGame(3)">3</button>
            <button class="btn-select" onclick="startGame(4)">4</button>
            <button class="btn-select" onclick="startGame(5)">5</button>
            <button class="btn-select" onclick="startGame(6)">6</button>
            <button class="btn-select" onclick="startGame(7)">7</button>
            <button class="btn-select" onclick="startGame(8)">8</button>
            <button class="btn-select" onclick="startGame(9)">9</button>
            <button class="btn-select" onclick="startGame(10)">10</button>
            <button class="btn-select" onclick="startGame(11)">11</button>
            <button class="btn-select" onclick="startGame(12)">12</button>
            <button class="btn-select" onclick="startGame(13)">13</button>
            <button class="btn-select" onclick="startGame(14)">14</button>
            <button class="btn-select" onclick="startGame(15)">15</button>
            <button class="btn-select" onclick="startGame(16)">16</button>
            <button class="btn-select" onclick="startGame(17)">17</button>
            <button class="btn-select" onclick="startGame(18)">18</button>
            <button class="btn-select" onclick="startGame(19)">19</button>
            <button class="btn-select" onclick="startGame(20)">20</button>
            <button class="btn-select" onclick="startGame(21)">21</button>
            <button class="btn-select" onclick="startGame(22)">22</button>
            <button class="btn-select" onclick="startGame(23)">23</button>
            <button class="btn-select" onclick="startGame(24)">24</button>
            <button class="btn-select" onclick="startGame(25)">25</button>
        </div>
    </div>

    <div id="scr2" class="hidden">
        <div class="header-info">
            <div>Players <b>400</b></div>
            <div>Bet <b>10</b></div>
            <div>Derash <b>3200</b></div>
        </div>
        <div class="circle"><div class="called-num" id="big-n">-</div></div>
        <div id="msg" style="color:#f1c40f; margin:10px;">በመዘጋጀት ላይ...</div>
        <table class="bingo-table">
            <thead><tr style="color:white;"><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
            <tbody id="card-body"></tbody>
        </table>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
        let cardData = []; let called = [];

        function startGame(id) {
            document.getElementById('scr1').classList.add('hidden');
            document.getElementById('scr2').classList.remove('hidden');
            
            const body = document.getElementById('card-body');
            body.innerHTML = "";
            cardData = [];
            let ranges = [,,,,];

            for(let r=0; r<5; r++) {
                let tr = document.createElement('tr');
                let row = [];
                for(let c=0; c<5; c++) {
                    let td = document.createElement('td');
                    if(r===2 && c===2) {
                        td.innerText = "FREE"; td.className = "marked";
                        row.push({v:"FREE", m:true});
                    } else {
                        let v;
                        do { v = Math.floor(Math.random()*(ranges[c]-ranges[c]+1))+ranges[c]; }
                        while(row.some(x => x.v === v) || cardData.some(pr => pr[c].v === v));
                        td.innerText = v; td.id = "r"+r+"c"+c;
                        row.push({v:v, m:false});
                    }
                    tr.appendChild(td);
                }
                cardData.push(row);
                body.appendChild(tr);
            }
            setTimeout(() => { document.getElementById('msg').innerText = "ጨዋታው ተጀምሯል!"; setInterval(draw, 4000); }, 2000);
        }

        function draw() {
            let n; do { n = Math.floor(Math.random()*75)+1; } while(called.includes(n));
            called.push(n);
            let L = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
            document.getElementById('big-n').innerText = L + "-" + n;

            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    if(cardData[r][r] && cardData[r][c].v === n) {
                        cardData[r][c].m = true;
                        let el = document.getElementById("r"+r+"c"+c);
                        if(el) el.classList.add('marked');
                    }
                }
            }
        }
    </script>
</body>
</html>
