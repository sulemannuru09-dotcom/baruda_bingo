<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baruda Bingo V3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #12182b; color: white; text-align: center; margin: 0; padding: 0; }
        .circle { width: 90px; height: 90px; border: 5px solid #4ee44e; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: #4ee44e; }
        .bingo-table { width: 95%; max-width: 360px; margin: 10px auto; border-collapse: separate; border-spacing: 3px; }
        .bingo-table th { background: #e94560; color: white; padding: 10px; border-radius: 4px; }
        .bingo-table td { background: #fff; color: #333; height: 50px; border-radius: 4px; font-size: 20px; font-weight: bold; }
        .marked { background: #4ee44e !important; color: white !important; }
        .sel-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
        .btn { background: #e94560; color: white; padding: 15px 0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="selection-page">
        <h2 style="margin-top:30px;">Dawi Bingo</h2>
        <p>እባክዎን ካርቴላ ይምረጡ</p>
        <div class="sel-grid" id="buttons-container"></div>
    </div>

    <div id="game-page" class="hidden">
        <div class="circle" id="call-box">-</div>
        <p id="status-text" style="color:#4ee44e; font-weight:bold;">ዝግጁ...</p>
        <table class="bingo-table">
            <thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
            <tbody id="card-layout"></tbody>
        </table>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // 1-100 ቁጥሮችን መፍጠር
        const container = document.getElementById('buttons-container');
        for(let i=1; i<=100; i++) {
            let b = document.createElement('button');
            b.className = 'btn';
            b.innerText = i;
            b.onclick = () => {
                document.getElementById('selection-page').classList.add('hidden');
                document.getElementById('game-page').classList.remove('hidden');
                startGame();
            };
            container.appendChild(b);
        }

        let called = [];
        let card = [];

        function startGame() {
            const layout = document.getElementById('card-layout');
            let ranges = [,,,,];
            let cols = ranges.map(r => {
                let n = [];
                while(n.length < 5) {
                    let v = Math.floor(Math.random()*(r-r+1))+r;
                    if(!n.includes(v)) n.push(v);
                }
                return n;
            });

            for(let r=0; r<5; r++) {
                let tr = document.createElement('tr');
                card[r] = [];
                for(let c=0; c<5; c++) {
                    let td = document.createElement('td');
                    let val = cols[c][r];
                    if(r===2 && c===2) {
                        td.innerText = "FREE"; td.className = "marked";
                        card[r][c] = "FREE";
                    } else {
                        td.innerText = val; td.id = "num-"+val;
                        card[r][c] = val;
                    }
                    tr.appendChild(td);
                }
                layout.appendChild(tr);
            }
            setInterval(drawNum, 4000);
        }

        function drawNum() {
            if(called.length >= 75) return;
            let n;
            do { n = Math.floor(Math.random()*75)+1; } while(called.includes(n));
            called.push(n);

            let L = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
            document.getElementById('call-box').innerText = L + "-" + n;
            document.getElementById('status-text').innerText = L + " " + n + " ተጠርቷል!";

            let el = document.getElementById("num-"+n);
            if(el) el.classList.add('marked');
        }
    </script>
</body>
</html>
