<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baruda Bingo 1-100</title>
    <style>
        body { background: #161e30; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .title { color: #4ee44e; font-size: 26px; font-weight: bold; margin: 15px 0; }
        
        /* ቁጥር መምረጫ ገጽ */
        #selector-page { display: block; }
        .selection-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 
            max-width: 400px; margin: 0 auto; background: #0c121c; 
            padding: 12px; border-radius: 12px; border: 2px solid #4ee44e;
            max-height: 450px; overflow-y: auto;
        }
        .num-btn { background: #e94560; color: white; border: none; padding: 15px 0; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 3px #c23950; }

        /* ካርቴላ ማሳያ ገጽ */
        #card-page { display: none; margin-top: 10px; }
        .card-header { color: #fee715; font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .bingo-table { width: 100%; max-width: 360px; margin: 0 auto; border-collapse: separate; border-spacing: 4px; }
        .bingo-table th { background: #e94560; color: white; padding: 12px; border-radius: 4px; font-size: 18px; }
        .bingo-table td { background: white; color: black; height: 55px; font-size: 24px; font-weight: bold; border-radius: 4px; width: 20%; }
        .free-slot { background: #4ee44e !important; color: white !important; font-size: 14px !important; }
        
        .back-btn { background: #4ee44e; border: none; padding: 12px 40px; border-radius: 8px; color: #161e30; font-weight: bold; margin-top: 25px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div id="selector-page">
        <div class="title">Baruda Bingo</div>
        <p>ካርቴላ ቁጥር ይምረጡ (1-100)</p>
        <div class="selection-grid" id="grid"></div>
    </div>

    <div id="card-page">
        <div class="card-header">የእርስዎ ካርቴላ № <span id="card-num-display"></span></div>
        <table class="bingo-table">
            <thead>
                <tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>
            </thead>
            <tbody id="card-content"></tbody>
        </table>
        <button class="back-btn" onclick="goBack()">ተመለስ</button>
    </div>

    <script>
        // 1. መጀመሪያ 100 ቁልፎችን መፍጠር
        const grid = document.getElementById('grid');
        let buttonsHtml = "";
        for (let i = 1; i <= 100; i++) {
            buttonsHtml += `<button class="num-btn" onclick="showCard(${i})">${i}</button>`;
        }
        grid.innerHTML = buttonsHtml;

        // 2. ቁጥር ሲነካ ካርቴላውን የሚያሳይ ተግባር
        function showCard(cardNumber) {
            document.getElementById('selector-page').style.display = 'none';
            document.getElementById('card-page').style.display = 'block';
            document.getElementById('card-num-display').innerText = cardNumber;
            
            const tbody = document.getElementById('card-content');
            tbody.innerHTML = ""; // መጀመሪያ ባዶ ማድረግ

            // ለእያንዳንዱ አምድ (B, I, N, G, O) ቁጥሮችን ማዘጋጀት
            const ranges = [
                {min: 1, max: 15},  // B
                {min: 16, max: 30}, // I
                {min: 31, max: 45}, // N
                {min: 46, max: 60}, // G
                {min: 61, max: 75}  // O
            ];

            let cardMatrix = [];

            // ለእያንዳንዱ አምድ 5 የዘፈቀደ ቁጥሮችን መምረጥ
            for (let i = 0; i < 5; i++) {
                let columnNumbers = [];
                let min = ranges[i].min;
                let max = ranges[i].max;
                
                while (columnNumbers.length < 5) {
                    let num = Math.floor(Math.random() * (max - min + 1)) + min;
                    if (!columnNumbers.includes(num)) {
                        columnNumbers.push(num);
                    }
                }
                cardMatrix.push(columnNumbers);
            }

            // ሰንጠረዡን በ rows መገንባት
            for (let r = 0; r < 5; r++) {
                let tr = document.createElement('tr');
                for (let c = 0; c < 5; c++) {
                    let td = document.createElement('td');
                    if (r === 2 && c === 2) {
                        td.innerText = "FREE";
                        td.className = "free-slot";
                    } else {
                        td.innerText = cardMatrix[c][r];
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        function goBack() {
            document.getElementById('card-page').style.display = 'none';
            document.getElementById('selector-page').style.display = 'block';
        }
    </script>
</body>
</html>
