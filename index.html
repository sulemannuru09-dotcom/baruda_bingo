<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baruda Bingo 1-100</title>
    <style>
        body { background: #161e30; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .title { color: #4ee44e; font-size: 28px; font-weight: bold; margin-bottom: 20px; }
        
        /* የቁጥር መምረጫው ሳጥን */
        .selection-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            max-width: 450px; 
            margin: 0 auto; 
            background: #0c121c; 
            padding: 15px; 
            border-radius: 15px; 
            border: 3px solid #4ee44e;
            max-height: 500px;
            overflow-y: auto; /* ወደ ታች ዝቅ አድርገህ እንድታያቸው */
        }

        /* የቀይ ቁልፎች መልክ */
        .num-btn { 
            background: #e94560; 
            color: white; 
            border: none; 
            padding: 15px 0; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px #c23950;
            transition: 0.2s;
        }
        
        .num-btn:active {
            box-shadow: 0 1px #c23950;
            transform: translateY(3px);
        }

        p { margin-bottom: 20px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="title">Baruda Bingo</div>
    <p>ካርቴላ ቁጥር ይምረጡ (1-100)</p>

    <div class="selection-grid">
        <script>
            for (let i = 1; i <= 100; i++) {
                document.write(`<button class="num-btn" onclick="alert('የመረጡት ካርቴላ ቁጥር፡ ' + ${i})">${i}</button>`);
            }
        </script>
    </div>

</body>
</html>
