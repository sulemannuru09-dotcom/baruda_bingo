<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Baruda Bingo White</title>
    <style>
        /* ነጭ ዳራ እና ግልጽ ዲዛይን */
        body { background-color: #ffffff; color: #333333; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .header { background: #f8f9fa; padding: 10px; border-bottom: 2px solid #28a745; margin-bottom: 15px; }
        
        /* 1-200 መምረጫ */
        #p1 { display: block; }
        .grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 
            max-width: 450px; margin: 0 auto; padding: 10px;
            max-height: 70vh; overflow-y: auto; border: 1px solid #ddd; border-radius: 10px;
        }
        .n-btn { background-color: #28a745; color: white; border: none; padding: 15px 0; border-radius: 5px; font-weight: bold; font-size: 16px; }

        /* ካርቴላ ገጽ */
        #p2 { display: none; }
        table { width: 100%; max-width: 380px; margin: 15px auto; border-collapse: separate; border-spacing: 3px; background: #fff; }
        th { background: #dc3545; color: white; padding: 10px; font-size: 20px; border-radius: 4px; }
        td { background: #f1f3f5; color: #212529; height: 55px; font-size: 24px; font-weight: bold; border: 1px solid #dee2e6; border-radius: 4px; width: 20%; }
        
        .free { background-color: #28a745 !important; color: white !important; font-size: 14px !important; }
        .back-btn { background-color: #6c757d; color: white; border: none; padding: 12px 40px; border-radius: 8px; margin-top: 20px; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="p1">
        <div class="header">
            <h2 style="color: #28a745; margin: 0;">Baruda Bingo</h2>
            <p>ካርቴላ ቁጥር ይምረጡ (1-200)</p>
        </div>
        <div class="grid" id="g"></div>
    </div>

    <div id="p2">
        <h2 id="cid" style="color: #dc3545;"></h2>
        <table>
            <thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
            <tbody id="tb"></tbody>
        </table>
        <button class="back-btn" onclick="window.location.reload()">ተመለስ</button>
    </div>

    <script>
        const g = document.getElementById('g');
        // 1-200 ቁልፎችን መፍጠር
        for (let i = 1; i <= 200; i++) {
            let b = document.createElement('button');
            b.className = 'n-btn';
            b.innerText = i;
            b.onclick = () => {
                document.getElementById('p1').style.display = 'none';
                document.getElementById('p2').style.display = 'block';
                document.getElementById('cid').innerText = "ካርቴላ № " + i;
                makeCard();
            };
            g.appendChild(b);
        }

        function makeCard() {
            const tb = document.getElementById('tb');
            tb.innerHTML = "";
            let card = [[],[],[],[],[]];
            let rgs = [,,,,];
            
            for(let i=0; i<5; i++) {
                while(card[i].length < 5) {
                    let r = Math.floor(Math.random()*(rgs[i]-rgs[i]+1))+rgs[i];
                    if(!card[i].includes(r)) card[i].push(r);
                }
            }

            for(let r=0; r<5; r++) {
                let tr = document.createElement('tr');
                for(let c=0; c<5; c++) {
                    let td = document.createElement('td');
                    if(r===2 && c===2) {
                        td.innerText = "FREE";
                        td.className = "free";
                    } else {
                        td.innerText = card[c][r];
                    }
                    tr.appendChild(td);
                }
                tb.appendChild(tr);
            }
        }
    </script>
</body>
</html>
