<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baruda Bingo - Card View</title>
    <style>
        body { background: #161e30; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        /* ቁጥር መምረጫ ገጽ */
        #selector-view { display: block; }
        .title { color: #4ee44e; font-size: 28px; margin: 20px 0; }
        .selection-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 
            max-width: 400px; margin: 0 auto; background: #0c121c; 
            padding: 10px; border-radius: 12px; border: 2px solid #4ee44e;
            max-height: 450px; overflow-y: auto;
        }
        .num-btn { 
            background: #e94560; color: white; border: none; padding: 15px 0; 
            border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px #c23950;
        }

        /* ካርቴላ ማሳያ ገጽ */
        #card-view { display: none; margin-top: 20px; }
        .card-header { color: #fee715; font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        
        .bingo-table { width: 95%; max-width: 380px; margin: 0 auto; border-collapse: separate; border-spacing: 4px; }
        .bingo-table th { background: #e94560; color: white; padding: 12px; border-radius: 4px; font-size: 20px; }
        .bingo-table td { background: white; color: black; height: 55px; width: 20%; font-size: 24px; font-weight: bold; border-radius: 4px; }
        .free-slot { background: #4ee44e !important; color: white !important; }
        
        .back-btn { background: #4ee44e; border: none; padding: 12px 30px; border-radius: 6px; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="selector-view">
        <div class="title">Baruda Bingo</div>
        <p>ካርቴላ ቁጥር ይምረጡ (1-200)</p>
        <div class="selection-grid" id="num-grid"></div>
    </div>

    <div id="card-view">
        <div class="card-header">የእርስዎ ካርቴላ № <span id="card-no"></span></div>
        <table class="bingo-table">
            <thead>
                <tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>
            </thead>
            <tbody id="bingo-body"></tbody>
        </table>
        <button class="back-btn" onclick="goBack()">ተመለስ</button>
    </div>

    <script>
        // 200 ቁጥሮችን መፍጠር
        const grid = document.getElementById('num-grid');
        for (let i = 1; i <= 200; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.innerText = i;
            btn.onclick = () => openCard(i);
            grid.appendChild(btn);
        }

        function openCard(n) {
            document.getElementById('selector-view').style.display = 'none';
            document.getElementById('card-view').style.display = 'block';
            document.getElementById('card-no').innerText = n;
            createCard();
        }

        function createCard() {
            const tbody = document.getElementById('bingo-body');
            tbody.innerHTML = ""; // የቆየውን ማጽዳት
            
            // የቢንጎ ቁጥሮችን በየአምዱ ማዘጋጀት
            let columns = [];
            for (let i = 0; i < 5; i++) {
                let start = (i * 15) + 1;
                let end = start + 14;
                let pool = [];
                for (let x = start; x <= end; x++) pool.push(x);
                pool.sort(() => Math.random() - 0.5);
                columns.push(pool.slice(0, 5));
            }

            // ሰንጠረዡን መገንባት
            for (let r = 0; r < 5; r++) {
                let row = document.createElement('tr');
                for (let c = 0; c < 5; c++) {
                    let cell = document.createElement('td');
                    if (r === 2 && c === 2) {
                        cell.innerText = "FREE";
                        cell.className = "free-slot";
                    } else {
                        cell.innerText = columns[c][r];
                    }
                    row.appendChild(cell);
                }
                tbody.appendChild(row);
            }
        }

        function goBack() {
            document.getElementById('card-view').style.display = 'none';
            document.getElementById('selector-view').style.display = 'block';
        }
    </script>
</body>
</html>
