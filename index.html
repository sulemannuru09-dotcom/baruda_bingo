<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dawi Bingo Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1c2541; color: white; text-align: center; margin: 0; padding: 0; overflow: hidden; }
        .header-info { display: flex; justify-content: space-around; background: #0b132b; padding: 10px 0; font-size: 12px; border-bottom: 1px solid #3a506b; }
        .header-info b { font-size: 16px; color: #ffffff; }
        .circle-outer { margin: 15px auto; width: 100px; height: 100px; border: 5px solid #4ee44e; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(78, 228, 78, 0.1); }
        .called-num { font-size: 34px; font-weight: bold; color: #4ee44e; }
        .bingo-table { width: 95%; max-width: 380px; margin: 5px auto; border-collapse: separate; border-spacing: 3px; }
        .bingo-table th { background: #e94560; color: white; padding: 10px 0; border-radius: 4px; font-size: 18px; width: 20%; }
        .bingo-table td { background: #ffffff; color: #000000; height: 52px; border-radius: 4px; font-size: 22px; font-weight: bold; }
        .marked { background: #4ee44e !important; color: white !important; }
        .hidden { display: none !important; }
        .sel-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; max-height: 70vh; overflow-y: auto; }
        .btn-select { background: #e94560; color: white; padding: 15px 0; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; }
        #timer-text { font-size: 20px; color: #f1c40f; margin: 10px; font-weight: bold; }
        #win-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .win-box { background: #e94560; padding: 40px 20px; border-radius: 20px; border: 4px solid white; width: 85%; }
        .win-box h1 { font-size: 45px; margin: 0; }
        .win-box button { margin-top: 20px; padding: 12px 30px; border-radius: 10px; border: none; background: white; color: #e94560; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div id="scr1">
        <h2 style="margin-top:30px;">Dawi Bingo</h2>
        <p>ካርቴላ ይምረጡ</p>
        <div class="sel-grid" id="grid"></div>
    </div>

    <div id="scr2" class="hidden">
        <div class="header-info">
            <div>Players <b>400</b></div>
            <div>Bet <b>10</b></div>
            <div>Derash <b>3200</b></div>
        </div>
        <div class="circle-outer"><div class="called-num" id="big-n">-</div></div>
        <div id="timer-text"></div>
        <p id="stat-text" style="font-weight:bold; color:#4ee44e;">በዝግጅት ላይ...</p>
        <table class="bingo-table">
            <thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
            <tbody id="card-body"></tbody>
        </table>
    </div>

    <div id="win-overlay" class="hidden">
        <div class="win-box">
            <h1>BINGO! 🎉</h1>
            <p style="font-size: 22px;">አሸናፊ ነህ!</p>
            <button onclick="resetGame()">አዲስ ጨዋታ ጀምር</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
        let cardData = []; let called = []; let gameLoop; let isOver = false;

        function buildGrid() {
            const g = document.getElementById('grid'); g.innerHTML = "";
            for(let i=1; i<=25; i++) {
                let b = document.createElement('button'); b.className='btn-select'; b.innerText=i;
                b.onclick = () => start(i); g.appendChild(b);
            }
        }

        function start(id) {
            document.getElementById('scr1').classList.add('hidden');
            document.getElementById('scr2').classList.remove('hidden');
            setupCard();
        }

        function setupCard() {
            const body = document.getElementById('card-body'); body.innerHTML = "";
            cardData = []; called = []; isOver = false;
            let ranges = [,,,,];

            for(let r=0; r<5; r++) {
                let tr = document.createElement('tr'); let row = [];
                for(let c=0; c<5; c++) {
                    let td = document.createElement('td');
                    if(r===2 && c===2) {
                        td.innerText="FREE"; td.className="marked"; row.push({v:"FREE", m:true});
                    } else {
                        let v;
                        do { v = Math.floor(Math.random()*(ranges[c]-ranges[c]+1))+ranges[c]; } 
                        while(row.some(x => x.v === v) || cardData.some(prev => prev[c].v === v));
                        td.innerText=v; td.id="r"+r+"c"+c; row.push({v:v, m:false});
                    }
                    tr.appendChild(td);
                } cardData.push(row); body.appendChild(tr);
            }

            let seconds = 30;
            const tEl = document.getElementById('timer-text');
            const cd = setInterval(() => {
                tEl.innerText = "ጨዋታው ለመጀመር " + seconds + " ይቀራል";
                if(seconds-- <= 0) {
                    clearInterval(cd); tEl.classList.add('hidden');
                    document.getElementById('stat-text').innerText = "ጨዋታው ተጀምሯል!";
                    gameLoop = setInterval(draw, 4000);
                }
            }, 1000);
        }

        function draw() {
            if(isOver || called.length >= 75) { clearInterval(gameLoop); return; }
            let n; do { n = Math.floor(Math.random()*75)+1; } while(called.includes(n));
            called.push(n);
            let L = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
            document.getElementById('big-n').innerText = L + "-" + n;

            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    if(cardData[r][c].v === n) {
                        cardData[r][c].m = true;
                        let el = document.getElementById("r"+r+"c"+c);
                        if(el) el.classList.add('marked');
                        checkWin();
                    }
                }
            }
        }

        function checkWin() {
            for(let i=0; i<5; i++) {
                if(cardData[i].every(x => x.m)) return win();
                if(cardData.every(r => r[i].m)) return win();
            }
            if(.every(i => cardData[i][i].m)) return win();
            if(.every(i => cardData[i][4-i].m)) return win();
            if(cardData.m && cardData.m && cardData.m && cardData.m) return win();
        }

        function win() {
            isOver = true; clearInterval(gameLoop);
            document.getElementById('win-overlay').classList.remove('hidden');
            tg.HapticFeedback.notificationOccurred('success');
        }

        function resetGame() {
            location.reload();
        }

        buildGrid();
    </script>
</body>
</html>
