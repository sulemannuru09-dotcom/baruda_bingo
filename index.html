<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawi Bingo</title>
    <style>
        body { font-family: sans-serif; background: #12182b; color: white; text-align: center; }
        .hidden { display: none; }
        table { width: 95%; margin: 20px auto; border-collapse: collapse; background: white; color: black; }
        td { border: 2px solid #12182b; height: 50px; font-size: 22px; font-weight: bold; width: 20%; }
        .marked { background: #4ee44e !important; color: white !important; }
        .btn { background: #e94560; color: white; border: none; padding: 15px; margin: 5px; border-radius: 5px; font-weight: bold; width: 60px; }
    </style>
</head>
<body>

    <div id="p1">
        <h2 style="margin-top:20px;">Dawi Bingo</h2>
        <p>ካርቴላ ለመጀመር አንዱን ቁጥር ይጫኑ</p>
        <div id="btns"></div>
    </div>

    <div id="p2" class="hidden">
        <h1 id="call" style="font-size: 50px; color: #4ee44e; margin: 20px;">-</h1>
        <table>
            <tbody id="card"></tbody>
        </table>
        <p id="msg">ጨዋታው ተጀምሯል...</p>
    </div>

    <script>
        // ቁልፎቹን መፍጠር
        const btns = document.getElementById('btns');
        for(let i=1; i<=25; i++) {
            let b = document.createElement('button');
            b.className = 'btn'; b.innerText = i;
            b.onclick = start;
            btns.appendChild(b);
        }

        function start() {
            document.getElementById('p1').className = 'hidden';
            document.getElementById('p2').className = '';
            
            const card = document.getElementById('card');
            // ሰንጠረዡን መገንባት
            for(let r=0; r<5; r++) {
                let row = card.insertRow();
                for(let c=0; c<5; c++) {
                    let cell = row.insertCell();
                    let num = Math.floor(Math.random() * 75) + 1;
                    if(r==2 && c==2) {
                        cell.innerText = "FREE";
                        cell.className = "marked";
                    } else {
                        cell.innerText = num;
                        cell.id = "n" + num;
                    }
                }
            }
            // ቁጥር መጥራት
            setInterval(() => {
                let p = Math.floor(Math.random() * 75) + 1;
                document.getElementById('call').innerText = p;
                let el = document.getElementById("n" + p);
                if(el) el.className = "marked";
            }, 3000);
        }
    </script>
</body>
</html>
