<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baruda Bingo Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #161e30; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; }
        .header { display: flex; justify-content: space-around; background: #0c121c; padding: 10px; font-size: 14px; border-bottom: 2px solid #2a3441; }
        .header div b { color: #ffffff; font-size: 16px; }
        
        /* ቁጥር መምረጫ ገጽ */
        #selection-screen { padding: 20px; }
        .selection-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 10px; max-width: 400px; margin: 0 auto; border: 2px solid #4ee44e; border-radius: 15px; background: #0c121c; }
        .num-btn { background: #e94560; color: white; border: none; padding: 12px 5px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        /* የጨዋታ ገጽ */
        #game-screen { display: none; }
        .ball-area { margin: 15px auto 5px auto; width: 110px; height: 110px; border: 6px solid #4ee44e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; background: rgba(78, 228, 78, 0.1); }
        #ball-call-text { color: white; margin-bottom: 10px; font-size: 18px; height: 22px; }
        .grid { width: 95%; max-width: 380px; margin: 5px auto; border-spacing: 4px; }
        .grid th { background: #e94560; padding: 10px; border-radius: 4px; font-size: 20px; }
        .grid td { background: white; color: black; height: 55px; width: 20%; font-size: 24px; font-weight: bold; border-radius: 4px; }
        .marked { background: #4ee44e !important; color: white !important; }
        
        .calls-board { width: 95%; max-width: 380px; margin: 15px auto; border-collapse: separate; border-spacing: 1.5px; }
        .calls-board td { border-radius: 2px; font-size: 11px; font-weight: bold; color: white; padding: 3px; background: #0c121c; }
        .called-ball { background: #4ee44e !important; }
        
        #win-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #e94560; color: white; padding: 30px; border-radius: 15px; border: 4px solid white; z-index: 100; width: 250px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }
    </style>
</head>
<body>
    <div id="selection-screen">
        <h1 style="color:#4ee44e">Baruda Bingo</h1>
        <p>ካርቴላ ቁጥር ይምረጡ (1-200)</p>
        <div class="selection-grid" id="selection-grid"></div>
    </div>

    <div id="game-screen">
        <div class="overlay" id="overlay"></div>
        <div id="win-modal">
            <h2>BINGO!</h2>
            <p>አሸንፈሃል! 🎉</p>
            <button onclick="location.reload()" style="background: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold;">እንደገና ጀምር</button>
        </div>

        <div class="header">
            <div>Players<br><b>400</b></div>
            <div>Bet<br><b>10</b></div>
            <div>Derash<br><b>3200</b></div>
        </div>

        <div class="ball-area" id="ball-display">-</div>
        <div id="status" style="color:#fee715; margin:10px; font-weight:bold;">--</div>
        <div id="ball-call-text">--</div>
        <p style="color:#fee715">የእርስዎ ካርቴላ № <span id="selected-no"></span></p>

        <table class="grid">
            <thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
            <tbody id="card-body"></tbody>
        </table>

        <table class="calls-board" id="calls-board"><tbody></tbody></table>
        <button style="background:#f44336; border:none; padding:10px 20px; border-radius:5px; color:white; font-weight:bold; margin:15px;" onclick="tg.close()">Leave</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let card = []; let called = []; let isGameOver = false;

        // የቁጥር መምረጫ ሰሌዳን መፍጠር
        function initSelection() {
            const grid = document.getElementById('selection-grid');
            for (let i = 1; i <= 40; i++) { // ለሙከራ 40 ቁጥር፣ ወደ 200 መቀየር ትችላለህ
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = i;
                btn.onclick = () => selectCard(i);
                grid.appendChild(btn);
            }
        }

        function selectCard(num) {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('selected-no').innerText = num;
            generateCard();
            createCallsBoard();
            startCountdown();
        }

        function generateCard() {
            const tbody = document.getElementById('card-body');
            tbody.innerHTML = ""; card = [];
            let ranges = [,,,,];
            let columns = ranges.map(r => Array.from({length: 15}, (_, k) => k + r).sort(() => Math.random() - 0.5).slice(0, 5));
            for (let r = 0; r < 5; r++) {
                let tr = document.createElement('tr'); card[r] = [];
                for (let c = 0; c < 5; c++) {
                    let td = document.createElement('td'); let val = columns[c][r];
                    if (r === 2 && c === 2) {
                        td.innerText = "FREE"; td.className = "marked"; card[r][c] = { v: "FREE", m: true };
                    } else {
                        td.innerText = val; td.id = `cell-${r}-${c}`; card[r][c] = { v: val, m: false };
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        function createCallsBoard() {
            const b = document.getElementById('calls-board').querySelector('tbody');
            b.innerHTML = "";
            for(let r=0; r<5; r++) {
                let tr = document.createElement('tr');
                for(let c=1; c<=15; c++) {
                    let num = c + (r * 15);
                    let td = document.createElement('td'); td.id = "cball-" + num; td.innerText = num;
                    tr.appendChild(td);
                }
                b.appendChild(tr);
            }
        }

        function startCountdown() {
            let count = 5;
            let timer = setInterval(() => {
                document.getElementById('status').innerText = "ጨዋታው በ " + count + " ሰከንድ ይጀምራል...";
                if (count-- <= 0) {
                    clearInterval(timer);
                    document.getElementById('status').innerText = "ጨዋታው ተጀምሯል!";
                    setInterval(drawBall, 4000);
                }
            }, 1000);
        }

        function drawBall() {
            if (called.length >= 75 || isGameOver) return;
            let ball; do { ball = Math.floor(Math.random() * 75) + 1; } while (called.includes(ball));
            called.push(ball);
            let L = ball <= 15 ? "B" : ball <= 30 ? "I" : ball <= 45 ? "N" : ball <= 60 ? "G" : "O";
            document.getElementById('ball-display').innerText = `${L}-${ball}`;
            document.getElementById('ball-call-text').innerText = `${L} ${ball} ተጠርቷል!`;
            let ctd = document.getElementById("cball-" + ball); if(ctd) ctd.className = "called-ball";
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    if (card[r][c].v === ball) {
                        card[r][c].m = true;
                        document.getElementById(`cell-${r}-${c}`).className = "marked";
                        checkWin();
                    }
                }
            }
        }

        function checkWin() {
            for (let i = 0; i < 5; i++) { if (card[i].every(c => c.m) || card.every(r => r[i].m)) return showWin(); }
            if (card.every((row, i) => row[i].m) || card.every((row, i) => row[4 - i].m)) return showWin();
        }

        function showWin() {
            isGameOver = true;
            document.getElementById('win-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            tg.HapticFeedback.notificationOccurred('success');
        }

        window.onload = initSelection;
    </script>
</body>
</html>
