<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dawi Bingo Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1c2541; color: white; text-align: center; margin: 0; padding: 0; overflow: hidden; }
        .header-info { display: flex; justify-content: space-around; background: #0b132b; padding: 10px 0; font-size: 12px; border-bottom: 1px solid #3a506b; }
        .header-info b { font-size: 16px; color: #ffffff; }
        .circle-container { margin: 15px auto; width: 110px; height: 110px; border: 5px solid #4ee44e; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(78, 228, 78, 0.1); }
        .called-num { font-size: 38px; font-weight: bold; color: #4ee44e; }
        .bingo-table { width: 95%; max-width: 380px; margin: 5px auto; border-collapse: separate; border-spacing: 3px; }
        .bingo-table th { background: #e94560; color: white; padding: 10px 0; border-radius: 4px; font-size: 18px; }
        .bingo-table td { background: #ffffff; color: #000000; height: 50px; border-radius: 4px; font-size: 22px; font-weight: bold; width: 20%; }
        .marked { background: #4ee44e !important; color: white !important; }
        .hidden { display: none !important; }
        .sel-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .btn-select { background: #e94560; color: white; padding: 15px 0; border: none; border-radius: 6px; font-weight: bold; }
        #timer-display { font-size: 22px; color: #f1c40f; margin: 10px; font-weight: bold; }
        #win-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(233, 69, 96, 0.9); display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 1000; }
        .win-box { font-size: 50px; font-weight: bold; color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="scr1">
        <h2 style="margin-top:20px;">Dawi Bingo</h2>
        <p>ካርቴላ ይምረጡ</p>
        <div class="sel-grid" id="grid"></div>
    </div>

    <div id="scr2" class="hidden">
        <div class="header-info">
            <div>Players <b>400</b></div>
            <div>Bet <b>10</b></div>
            <div>Derash <b>3200</b></div>
        </div>
        <div class="circle-container"><div class="called-num" id="big-n">-</div></div>
        <div id="timer-display"></div>
        <p id="stat-text" style="font-weight:bold; color:#4ee44e;">የእርስዎ ካርቴላ</p>
        <table class="bingo-table">
            <thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
            <tbody id="card-body"></tbody>
        </table>
    </div>

    <div id="win-overlay" class="hidden">
        <div class="win-box">BINGO! 🎉</div>
        <p style="font-size:24px;">አሸናፊ ነህ!</p>
        <button onclick="location.reload()" style="padding:10px 20px; border-radius:10px; border:none; background:white; color:#e94560; font-weight:bold;">እንደገና ጀምር</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
        let cardData = []; let called = []; let isGameOver = false;

        // 100 ቁጥሮችን መፍጠር
        for(let i=1; i<=100; i++) {
            let b = document.createElement('button'); b.className='btn-select'; b.innerText=i;
            b.onclick = () => { document.getElementById('scr1').classList.add('hidden'); document.getElementById('scr2').classList.remove('hidden'); startGame(); };
            document.getElementById('grid').appendChild(b);
        }

        function startGame() {
            const body = document.getElementById('card-body'); body.innerHTML = ""; cardData = [];
            let ranges = [,,,,];
            
            for(let r=0; r<5; r++) {
                let tr = document.createElement('tr'); let row = [];
                for(let c=0; c<5; c++) {
                    let td = document.createElement('td');
                    if(r===2 && c===2) {
                        td.innerText="FREE"; td.className="marked"; row.push({v:"FREE", m:true});
                    } else {
                        let v; do { v = Math.floor(Math.random()*(ranges[c]-ranges[c]+1))+ranges[c]; } 
                        while(row.some(x => x.v === v) || cardData.some(r => r[c] && r[c].v === v));
                        td.innerText=v; td.id="r"+r+"c"+c; row.push({v:v, m:false});
                    }
                    tr.appendChild(td);
                } cardData.push(row); body.appendChild(tr);
            }

            let time = 30;
            const tEl = document.getElementById('timer-display');
            const cd = setInterval(() => {
                tEl.innerText = "ጨዋታው ለመጀመር " + time + " ይቀራል";
                if(time-- <= 0) { clearInterval(cd); tEl.classList.add('hidden'); setInterval(draw, 4000); }
            }, 1000);
        }

        function draw() {
            if(isGameOver || called.length >= 75) return;
            let n; do { n = Math.floor(Math.random()*75)+1; } while(called.includes(n));
            called.push(n);
            let L = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
            document.getElementById('big-n').innerText = L + "-" + n;
            document.getElementById('stat-text').innerText = L + " " + n + " ተጠርቷል!";

            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    if(cardData[r][c].v === n) {
                        cardData[r][c].m = true;
                        document.getElementById("r"+r+"c"+c).classList.add('marked');
                        checkWin();
                    }
                }
            }
        }

        function checkWin() {
            // Horizontal & Vertical
            for(let i=0; i<5; i++) {
                if(cardData[i].every(x => x.m)) return showWin();
                if(.every(r => cardData[r][i].m)) return showWin();
            }
            // Diagonals
            if(.every(i => cardData[i][i].m)) return showWin();
            if(.every(i => cardData[i][4-i].m)) return showWin();
            // Corners
            if(cardData.m && cardData.m && cardData.m && cardData.m) return showWin();
        }

        function showWin() { isGameOver = true; document.getElementById('win-overlay').classList.remove('hidden'); tg.HapticFeedback.notificationOccurred('success'); }
    </script>
</body>
</html>
