<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 400px; margin: 15px auto; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; max-height: 350px; overflow-y: auto; }
        .btn { background: #28a745; color: white; border: none; padding: 15px 0; border-radius: 6px; font-weight: bold; font-size: 16px; }
        .btn:active { background: #dc3545; }
        #card-view { display: none; margin: 20px auto; background: white; color: black; border-radius: 12px; padding: 10px; max-width: 380px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #dc3545; color: white; padding: 8px; }
        td { height: 50px; font-size: 22px; font-weight: bold; border: 1px solid #ddd; }
        .free { background: #28a745 !important; color: white; font-size: 12px; }
    </style>
</head>
<body>
    <h3>Baruda 100</h3>
    <div id="selection-page">
        <p>ካርቴላ ይምረጡ (1-100)</p>
        <div class="grid" id="g"></div>
    </div>
    <div id="card-view">
        <h3 id="t" style="color: #dc3545;"></h3>
        <table>
            <thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>
            <tbody id="tb"></tbody>
        </table>
        <button onclick="location.reload()" style="margin-top:15px; padding:10px 30px; background:#333; color:white; border:none; border-radius:5px;">ተመለስ</button>
    </div>
    <script>
        const g = document.getElementById('g');
        for (let i = 1; i <= 100; i++) {
            let b = document.createElement('button');
            b.className = 'btn';
            b.innerText = i;
            b.onclick = function() { showBingo(i); };
            g.appendChild(b);
        }
        function showBingo(n) {
            document.getElementById('selection-page').style.display = 'none';
            document.getElementById('card-view').style.display = 'block';
            document.getElementById('t').innerText = "ካርቴላ № " + n;
            const tb = document.getElementById('tb');
            tb.innerHTML = "";
            let cols = [[],[],[],[],[]];
            let rgs = [,,,,];
            for(let i=0; i<5; i++){
                while(cols[i].length < 5){
                    let r = Math.floor(Math.random()*(rgs[i]-rgs[i]+1))+rgs[i];
                    if(!cols[i].includes(r)) cols[i].push(r);
                }
            }
            for(let r=0; r<5; r++){
                let tr = document.createElement('tr');
                for(let c=0; c<5; c++){
                    let td = document.createElement('td');
                    td.innerText = (r==2 && c==2) ? "FREE" : cols[c][r];
                    if(r==2 && c==2) td.className = "free";
                    tr.appendChild(td);
                }
                tb.appendChild(tr);
            }
        }
    </script>
</body>
</html>
